services:
  - type: web
    name: plms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set this to your MongoDB Atlas connection string in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random secret key
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false # Set this to your Vercel frontend URL (e.g. https://your-app.vercel.app)
      - key: AUTO_SEED_PRODUCTION_DATA
        value: "true"
